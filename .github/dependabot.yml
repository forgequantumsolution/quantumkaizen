version: 2
updates:
  # ── Server npm dependencies ───────────────────────────────────────
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - server
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  # ── Client npm dependencies ───────────────────────────────────────
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - client
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch

  # ── Root npm dependencies ─────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # ── GitHub Actions ────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # ── Docker base images ────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
