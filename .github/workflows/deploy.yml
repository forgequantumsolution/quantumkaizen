  # ── DEPLOY PRODUCTION ────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment: production  # requires manual approval in GitHub Settings
    steps:
      - uses: actions/checkout@v4

