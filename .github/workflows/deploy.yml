name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}/server
  CLIENT_IMAGE: ghcr.io/${{ github.repository }}/client

jobs:
  # ─── Build & Push Docker Images ─────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.SERVER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.CLIENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ─── Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # ── Option A: AWS ECS ──────────────────────────────────────────
      # Uncomment and configure for AWS ECS deployment
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ vars.AWS_REGION }}
      #
      # - name: Deploy to ECS
      #   run: |
      #     aws ecs update-service \
      #       --cluster quantum-kaizen-staging \
      #       --service qk-server \
      #       --force-new-deployment
      #     aws ecs update-service \
      #       --cluster quantum-kaizen-staging \
      #       --service qk-client \
      #       --force-new-deployment

      # ── Option B: Azure Container Apps ─────────────────────────────
      # Uncomment and configure for Azure deployment
      # - name: Azure Login
      #   uses: azure/login@v1
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Deploy to Azure Container Apps
      #   run: |
      #     az containerapp update \
      #       --name qk-server \
      #       --resource-group quantum-kaizen-staging \
      #       --image ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.VERSION }}
      #     az containerapp update \
      #       --name qk-client \
      #       --resource-group quantum-kaizen-staging \
      #       --image ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.VERSION }}

      # ── Option C: Docker Compose on VM (SSH) ───────────────────────
      # Uncomment and configure for direct VM deployment
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     script: |
      #       cd /opt/quantum-kaizen
      #       docker compose -f docker-compose.prod.yml pull
      #       docker compose -f docker-compose.prod.yml up -d
      #       docker compose -f docker-compose.prod.yml exec server npx prisma migrate deploy

      - name: Deployment placeholder
        run: |
          echo "=== Quantum Kaizen Deployment ==="
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Server Image: ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.VERSION }}"
          echo "Client Image: ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.VERSION }}"
          echo ""
          echo "Configure one of the deployment options above (AWS ECS, Azure Container Apps, or SSH)"
          echo "by uncommenting the relevant section and adding required secrets."

  # ─── Deploy to Production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Production deployment placeholder
        run: |
          echo "=== Production Deployment ==="
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Requires manual approval via GitHub environment protection rules."
          echo "Configure the deployment steps matching your infrastructure provider."
