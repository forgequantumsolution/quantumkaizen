      - name: Production deployment info
        run: |
          echo "=== Production Deploy ==="
          echo "Version:      ${{ needs.build-and-push.outputs.version }}"
          echo "Server image: ${{ env.SERVER_IMAGE }}:${{ needs.build-and-push.outputs.version }}"
          echo "Client image: ${{ env.CLIENT_IMAGE }}:${{ needs.build-and-push.outputs.version }}"
          echo "Requires: manual approval via GitHub environment protection rules"

      - name: Post-deploy smoke test
        run: |
          echo "TODO: Run scripts/smoke-test.sh against production URL"

      - name: Create GitHub Release
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ needs.build-and-push.outputs.version }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `Quantum Kaizen v${version}`,
              body: `## Quantum Kaizen v${version}\n\n**Images:**\n- Server: \`${{ env.SERVER_IMAGE }}:${version}\`\n- Client: \`${{ env.CLIENT_IMAGE }}:${version}\`\n\n**SHA:** ${{ github.sha }}`,
              draft: false,
              prerelease: false,
            });
        continue-on-error: true
